name: Validate PR Labels

on:
  pull_request:
    types:
      [
        opened,
        reopened,
        labeled,
        unlabeled,
        synchronize,
        edited,
        ready_for_review,
      ]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Validate PR Labels
        uses: ./actions/validate-pr-labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
