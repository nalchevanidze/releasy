configVersion: 1

pkgs:
  core:
    name: '@relasy/core'
    paths: packages/core/**

  cli:
    name: '@relasy/cli'
    paths: packages/cli/**

  actions-common:
    name: '@relasy/actions-common'
    paths: packages/actions-common/**

  draft:
    name: '@relasy/draft-release-action'
    paths: actions/draft-release/**

  publish:
    name: '@relasy/publish-release-action'
    paths: actions/publish-release/**

  labels:
    name: '@relasy/validate-pr-labels-action'
    paths: actions/validate-pr-labels/**

  bootstrap:
    name: '@relasy/bootstrap-labels-action'
    paths: actions/bootstrap-labels/**

project:
  type: npm

labelPolicy: strict
nonPrCommitsPolicy: skip

# File-path based fallback when no explicit change-type label is present.
# Explicit PR label still has higher priority.
changeTypeScopes:
  docs:
    paths:
      - "packages/docs/**/*.md"
      - "**/*.md"
  test:
    paths:
      - "**/*.spec.ts"
      - "**/*.test.ts"
  fix:
    paths:
      - "**/bugfix/**"
  feature:
    paths:
      - "packages/**/src/**"

rules:
  requireInferredPackageLabels: true
  blockOnLabelConflict: false

changelog:
  headerTemplate: "## {{VERSION}} ({{DATE}})"
  sectionTitles:
    breaking: "Breaking Changes"
    feature: "New Features"
    fix: "Bug Fixes"
    chore: "Minor Changes"
    docs: "Documentation"
    test: "Testing"
  groupByPackage: true
