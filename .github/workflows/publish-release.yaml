name: Publish Release
on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  publish_release:
    if: ${{ github.base_ref == (vars.RELASY_BASE_BRANCH || 'main') && startsWith(github.head_ref, 'release-') && github.event.pull_request.merged == true  }}
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.publish.outputs.upload_url }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Publish to Registry
        run: # Commands to publish package to registry

      - name: Publish Release
        uses: ./actions/publish-release
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
